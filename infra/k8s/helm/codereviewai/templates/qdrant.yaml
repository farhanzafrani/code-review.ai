{{- if .Values.qdrant.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-qdrant-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-qdrant
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codereviewai.labels" (dict "root" $ "component" "qdrant") | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          ports:
            - containerPort: {{ .Values.qdrant.port }}
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
      volumes:
        - name: data
          {{- if .Values.qdrant.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-qdrant-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-qdrant
spec:
  selector:
    {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "qdrant") | nindent 4 }}
  ports:
    - port: {{ .Values.qdrant.port }}
      targetPort: {{ .Values.qdrant.port }}
