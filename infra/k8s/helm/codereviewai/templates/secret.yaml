apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GITHUB_APP_CLIENT_ID: {{ .Values.secrets.githubAppClientId | quote }}
  GITHUB_APP_CLIENT_SECRET: {{ .Values.secrets.githubAppClientSecret | quote }}
  GITHUB_APP_WEBHOOK_SECRET: {{ .Values.secrets.githubAppWebhookSecret | quote }}
  github-app-private-key.pem: {{ .Values.secrets.githubAppPrivateKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  SONARQUBE_TOKEN: {{ .Values.secrets.sonarqubeToken | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
