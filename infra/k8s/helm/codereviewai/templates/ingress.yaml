{{- if .Values.global.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
spec:
  ingressClassName: {{ .Values.global.ingress.className }}
  rules:
    - host: {{ .Values.global.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port: { number: {{ .Values.frontend.port }} }
    # Separate host, not a path prefix: the backend's routes (/auth,
    # /webhooks, /repositories, ...) are mounted at root with no /api
    # prefix, so path-based routing on one host would collide with the
    # frontend's own routes. NEXT_PUBLIC_API_URL must be rebuilt into the
    # frontend image pointing at this host — see infra/k8s/README.md.
    - host: "api.{{ .Values.global.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port: { number: {{ .Values.backend.port }} }
{{- end }}
