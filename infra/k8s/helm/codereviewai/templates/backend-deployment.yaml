apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codereviewai.labels" (dict "root" $ "component" "backend") | nindent 8 }}
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Release.Name }}-secrets }
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Release.Name }}-secrets }
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
          volumeMounts:
            - name: github-app-key
              # NOT /run/secrets: that's where the automatic service-account
              # token also mounts (/var/run/secrets -> /run/secrets), and a
              # read-only mount there blocks kubelet from creating its own
              # subdirectory underneath, so the container never starts.
              mountPath: /etc/secrets/github-app
              readOnly: true
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: github-app-key
          secret:
            secretName: {{ .Release.Name }}-secrets
            items:
              - key: github-app-private-key.pem
                path: github-app-private-key.pem
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
spec:
  selector:
    {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "backend") | nindent 4 }}
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
