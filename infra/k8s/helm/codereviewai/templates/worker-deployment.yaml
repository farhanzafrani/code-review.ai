apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codereviewai.labels" (dict "root" $ "component" "worker") | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["uv", "run", "--no-sync", "celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Release.Name }}-secrets }
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
          volumeMounts:
            - name: github-app-key
              mountPath: /etc/secrets/github-app
              readOnly: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: github-app-key
          secret:
            secretName: {{ .Release.Name }}-secrets
            items:
              - key: github-app-private-key.pem
                path: github-app-private-key.pem
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-worker-metrics
spec:
  selector:
    {{- include "codereviewai.selectorLabels" (dict "root" $ "component" "worker") | nindent 4 }}
  ports:
    - port: {{ .Values.worker.metricsPort }}
      targetPort: {{ .Values.worker.metricsPort }}
