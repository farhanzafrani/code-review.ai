name: codereviewai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codereviewai
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Opt-in: `docker compose --profile sonarqube up` to include this.
  # Needs ~2GB+ RAM and a one-time setup — see README before enabling
  # SONARQUBE_ENABLED in .env.
  sonarqube:
    image: sonarqube:community
    profiles: ["sonarqube"]
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  backend:
    build:
      context: ../../apps/backend
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ../../apps/backend
    env_file:
      - ../../.env
    ports:
      - "9200:9200"
    volumes:
      - ../../apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uv run celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build:
      context: ../../apps/frontend
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  frontend_node_modules:
  frontend_next:
